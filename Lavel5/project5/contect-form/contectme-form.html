<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <fieldset>
        <legend><b>Contact-US </b></legend>

        <label for="name"><b>Name&nbsp;:</b></label><br>
        <input type="text" id="name">

        <br><br>

        <label for="mobile-number"><b>Phone.no.&nbsp;:</b></label><br>
        <input type="tel" id="mobile-number" pattern="[0-9]{10}" maxlength="10" required>

        <br><br>

        <label for="e-mail"><b>Enter your e-mail&nbsp;:</b></label><br>
        <input type="email" required>

        <br><br>

        <label for="massage"><b>Enter your massage&nbsp;:</b></label><br>
        <textarea name="massage" id="massage" rows="10" cols="50" >Enter why you content us</textarea>
        
        <legend> 
            <input type="submit">
        </legend>
        
    </fieldset>


</body>

</html>
